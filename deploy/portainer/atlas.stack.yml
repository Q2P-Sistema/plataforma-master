version: "3.8"

# ── SERVIÇOS ────────────────────────────────────────────────
services:
  # ── ATLAS API ─────────────────────────────────────────────
  atlas_api:
    image: plasticosq2p/atlas-api:latest
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    environment:
      NODE_ENV: production
      API_PORT: "3005"

      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SESSION_SECRET: ${SESSION_SECRET}

      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}

      N8N_HEALTH_URL: ${N8N_HEALTH_URL}

      # ── Feature Flags ────────────────────────
      MODULE_HEDGE_ENABLED: ${MODULE_HEDGE_ENABLED:-false}
      MODULE_STOCKBRIDGE_ENABLED: ${MODULE_STOCKBRIDGE_ENABLED:-false}
      MODULE_BREAKINGPOINT_ENABLED: ${MODULE_BREAKINGPOINT_ENABLED:-false}
      MODULE_CLEVEL_ENABLED: ${MODULE_CLEVEL_ENABLED:-false}
      MODULE_COMEXINSIGHT_ENABLED: ${MODULE_COMEXINSIGHT_ENABLED:-false}
      MODULE_COMEXFLOW_ENABLED: ${MODULE_COMEXFLOW_ENABLED:-false}
      MODULE_FORECAST_ENABLED: ${MODULE_FORECAST_ENABLED:-false}

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
      labels:
        - traefik.enable=true
        - traefik.http.routers.atlas-api.rule=Host(`atlas.q2p.com.br`) && PathPrefix(`/api`)
        - traefik.http.routers.atlas-api.entrypoints=websecure
        - traefik.http.routers.atlas-api.tls=true
        - traefik.http.routers.atlas-api.tls.certresolver=letsencryptresolver
        - traefik.http.routers.atlas-api.service=atlas-api
        - traefik.http.services.atlas-api.loadbalancer.server.port=3005
        - traefik.http.services.atlas-api.loadbalancer.server.scheme=http

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3005/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

    networks:
      - network_swarm_public
      - network_dev_swarm_public

  # ── ATLAS WEB ─────────────────────────────────────────────
  atlas_web:
    image: plasticosq2p/atlas-web:latest
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
      labels:
        - traefik.enable=true
        - traefik.http.routers.atlas-web.rule=Host(`atlas.q2p.com.br`)
        - traefik.http.routers.atlas-web.entrypoints=websecure
        - traefik.http.routers.atlas-web.tls=true
        - traefik.http.routers.atlas-web.tls.certresolver=letsencryptresolver
        - traefik.http.routers.atlas-web.service=atlas-web
        - traefik.http.routers.atlas-web.priority=1
        - traefik.http.services.atlas-web.loadbalancer.server.port=80
        - traefik.http.services.atlas-web.loadbalancer.server.scheme=http

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

    networks:
      - network_swarm_public

# ── REDES DOCKER ────────────────────────────────────────────
networks:
  network_swarm_public:
    external: true
  network_dev_swarm_public:
    external: true
