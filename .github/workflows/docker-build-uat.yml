name: Docker Image CI — UAT

on:
  push:
    branches:
      - uat
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Definir short SHA
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e push — Atlas API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            plasticosq2p/atlas-api:uat
            plasticosq2p/atlas-api:uat-${{ env.SHORT_SHA }}

      - name: Build e push — Atlas Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            plasticosq2p/atlas-web:uat
            plasticosq2p/atlas-web:uat-${{ env.SHORT_SHA }}
